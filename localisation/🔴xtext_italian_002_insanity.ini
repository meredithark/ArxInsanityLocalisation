// Character creation

[insanity_button_normal_start]
string="Punti iniziali preimpostati"

[insanity_desc_normal_start]
string="Punti iniziali abilitati. Adesso puoi cominciare il gioco senza creare una dover configurare tutto il personaggio nel dettaglio. Assegna solo i punti che vuoi, o anche nessuno. Tutti i punti rimasti potranno essere distribuiti in seguito."

[insanity_button_hardcore_start]
string="Nessun punto iniziale"

[insanity_desc_hardcore_start]
string="Punti iniziali disabilitati. Non si potranno assegnare punti all’inizio del gioco poichè verranno azzerati. Si potrà continuare poi con la progressione naturale, ottenendo punti attributo e abilità salendo di livello."

[insanity_suffix_immersive_mode_on]
string=" : Abilitato"

[insanity_suffix_immersive_mode_off]
string=" : Disabilitato"

[insanity_button_immersive_mode] //immersive mode button
string="Modalità Immersiva (Interfaccia minima)"

[insanity_desc_immersive_mode]
string="Gli elementi dell’interfaccia saranno ridotti al minimo per mantenere lo schermo libero e fornire una esperienza più immersiva. Solo le icone essenziali rimarranno visibili, come l’inventario, i libri, e le icone di transizione livello. La Modalità Immersiva può essere cambiata in qualsiasi momento dal menu delle opzioni (Impostazioni Gioco)."

