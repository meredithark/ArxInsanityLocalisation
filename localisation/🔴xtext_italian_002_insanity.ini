//ARX INSANITY ITALIAN 0.6.0

//Translation by Meredith, Jen The Town Witch

//May 2026 update: All main menu descriptions have been capitalized in order to match Arx Insanity's new visual style and interface.

[insanity_choose_difficulty]
string="Seleziona la difficoltà:"

[insanity_button_difficulty_easy]
string="Facile"

[insanity_desc_difficulty_easy]
string="Un'esperienza disinvolta pensata per nuovi giocatori. Danni e Attributi dei nemici ridotti. Rigenerazione salute abilitata e cure più efficaci."

[insanity_button_difficulty_normal]
string="Normale"

[insanity_desc_difficulty_normal]
string="Un'esperienza bilanciata. I nemici sono più numerosi e infliggono danni inalterati, sono astuti e hanno attributi bilanciati. Rigenerazione salute disabilitata, pozioni e oggetti hanno efficacia normale."

[insanity_button_difficulty_hard]
string="Difficile"

[insanity_desc_difficulty_hard]
string="Una sfida pensata per giocatori con esperienza. I nemici sono più numerosi e infliggono danni aumentati, sono più percettivi e hanno attributi aumentati. Rigenerazione salute disabilitata, pozioni e oggetti hanno efficacia ridotta."

[insanity_button_difficulty_very_hard]
string="Molto difficile"

[insanity_desc_difficulty_very_hard]
string="Una sfida impegnativa pensata per i veterani. I nemici infliggono danni molto elevati, sono ancora più numerosi e sono molto più percettivi, oltre ad avere attributi fortemente aumentati. Rigenerazione salute disabilitata, pozioni e oggetti hanno efficacia ulteriormente ridotta."

[insanity_button_difficulty_insanity]
string="Insanity"

[insanity_desc_difficulty_insanity]
string="Un sfida brutale pensata per i giocatori più coraggiosi. I nemici infliggono danni estremamente elevati, sono ancora più numerosi, posseggono maggiore consapevolezza, e hanno attributi estremamente aumentati. Rigenerazione salute disabilitata, pozioni e oggetti hanno efficata significativamente ridotta."

[insanity_button_difficulty_nightmare] //secret difficulty
string="Incubo"

[insanity_desc_difficulty_nightmare]
string="La soppravvivenza è fondamentale, tutto ciò che ti circonda sprofonda nella follia. I nemici infliggono danni mortali, sono innumerevoli, hanno maggiore consapevolezza, sono più veloci, e posseggono attributi spaventosamente aumentati. Rigenerazione salute disabilitata, pozioni e oggetti hanno efficacia estremamente ridotta."

