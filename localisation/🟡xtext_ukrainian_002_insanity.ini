//ARX INSANITY UKRAINIAN 0.6.0

//Translation by Nazar Martyniuk

//May 2026 update: All main menu descriptions have been capitalized in order to match Arx Insanity's new visual style and interface.

[insanity_choose_difficulty]
string="Оберіть рівень складності:"

[insanity_button_difficulty_easy]
string="Легкий"

[insanity_desc_difficulty_easy]
string="Невимушений досвід для нових гравців. Шкода та характеристики ворогів знижені. Регенерація здоров'я увімкнена, а зілля та предмети мають високу ефективність."

[insanity_button_difficulty_normal]
string="Нормальний"

[insanity_desc_difficulty_normal]
string="Збалансований досвід для більшості гравців. Вороги завдають звичайної шкоди, уважні та мають збалансовані характеристики. Регенерація здоров'я вимкнена, більше ворогів, а зілля та предмети зберігають звичайну ефективність."

[insanity_button_difficulty_hard]
string="Важкий"

[insanity_desc_difficulty_hard]
string="Підвищена складність для досвідчених гравців. Вороги завдають більше шкоди, уважніші та мають підвищені характеристики. Регенерація здоров'я вимкнена, більше ворогів, а зілля та предмети менш ефективні."

[insanity_button_difficulty_very_hard]
string="Дуже важкий"

[insanity_desc_difficulty_very_hard]
string="Серйозне випробування для загартованих гравців. Вороги завдають значно більше шкоди, ще уважніші та мають значно підвищені характеристики. Регенерація здоров'я вимкнена, ще більше ворогів, а зілля та предмети ще менш ефективні."

[insanity_button_difficulty_insanity]
string="Божевілля"

[insanity_desc_difficulty_insanity]
string="Жорстокий досвід для хардкорних гравців. Вороги завдають екстремальної шкоди, мають загострене сприйняття та значно підвищені характеристики. Регенерація здоров'я вимкнена, величезна кількість ворогів, а зілля та предмети суттєво менш ефективні."

[insanity_button_difficulty_nightmare] //secret difficulty
string="Кошмар"

[insanity_desc_difficulty_nightmare]
string="Виживання — це все, а сам світ стає кошмаром. Вороги завдають смертельної шкоди, мають загострене сприйняття, рухаються швидше та мають шалені характеристики. Регенерація здоров'я вимкнена, кількість ворогів приголомшлива, а зілля та предмети надзвичайно менш ефективні."

