// Character creation

[insanity_button_normal_start]
string="Стартові очки навичок за замовчуванням"

[insanity_desc_normal_start]
string="Стартові очки навичок увімкнені. Ви можете розпочати гру без детального створення персонажа. Розподіліть лише ті очки навичок, які хочете, або жодного. Невикористані очки навичок можна розподілити пізніше."

[insanity_button_hardcore_start]
string="Без стартових очок навичок"

[insanity_desc_hardcore_start]
string="Стартові очки навичок вимкнені. На початку гри не можна розподілити жодних очок навичок, оскільки вони будуть скинуті. Після цього прогресія продовжується у звичайному режимі, а очки навичок характеристик і навичок здобуваються при підвищенні рівня."

[insanity_suffix_immersive_mode_on]
string=" : Увімкнено"

[insanity_suffix_immersive_mode_off]
string=" : Вимкнено"

[insanity_button_immersive_mode] //immersive mode button
string="Імерсивний режим (Мінімальний HUD)"

[insanity_desc_immersive_mode]
string="Мінімальні елементи HUD забезпечують чистіший екран та більш занурюючий досвід. Лише необхідні іконки залишаються видимими, як-от інвентар, книги та іконки переходу між рівнями. Імерсивний режим можна перемкнути в будь-який час у меню налаштувань (Ігровий процес)."

