//Translation by Pedro Ordaz and Leslie Ramírez

//May 2026 update: All main menu descriptions have been capitalized in order to match Arx Insanity's new visual style and interface.

[insanity_choose_difficulty]
string="Selecciona el nivel de dificultad:"

[insanity_button_difficulty_easy]
string="Fácil"

[insanity_desc_difficulty_easy]
string="Una experiencia casual para nuevos jugadores. El daño y los atributos de los enemigos están reducidos. La regeneración de salud está activada y las pociones/objetos son altamente efectivos."

[insanity_button_difficulty_normal]
string="Normal"

[insanity_desc_difficulty_normal]
string="Una experiencia equilibrada para la mayoría de jugadores. Los enemigos infligen daño normal, poseen una percepción balanceada y cuentan con atributos equilibrados. La regeneración de salud está desactivada, aparecen más enemigos, y las pociones/objetos conservan su efectividad normal."

[insanity_button_difficulty_hard]
string="Difícil"

[insanity_desc_difficulty_hard]
string="Un desafío mayor para jugadores experimentados. Los enemigos infligen más daño, poseen una mayor percepción y cuentan con atributos incrementados. La regeneración de salud está desactivada, aparecen más enemigos y las pociones/objetos son menos efectivos."

[insanity_button_difficulty_very_hard]
string="Muy Difícil"

[insanity_desc_difficulty_very_hard]
string="Un desafío exigente para jugadores veteranos. Los enemigos infligen un daño considerablemnte mayor, poseen una percepción aún más aguda y cuentan con atributos altamente incrementados. La regeneración de salud está desactivada, aún más enemigos y las pociones/objetos son menos efectivos."

[insanity_button_difficulty_insanity]
string="Insanidad"

[insanity_desc_difficulty_insanity]
string="Una experiencia brutal para jugadores extremos. Los enemigos infligen daño extremo, poseen una percepción aumentada y tienen atributos enormemente incrementados. La regeneración de salud está desactivada, grandes cantidades de enemigos y las pociones/objetos son aún menos efectivos."

[insanity_button_difficulty_nightmare] //secret difficulty
string="Pesadilla"

[insanity_desc_difficulty_nightmare]
string="La supervivencia es esencial, y el mundo mismo se convierte en una peadilla. Los enemigos infligen daño letal, poseen una percepción aumentada, se mueven más rápido, y tienen atributos descomunales. La regeneración de salud está desactivada, la cantidad de enemigos es abrumadora, y las pociones/objetos son significativamente menos efectivos."

