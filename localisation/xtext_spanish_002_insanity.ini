// Character creation

[insanity_button_normal_start]
string="Puntos de Inicio Predeterminados"

[insanity_desc_normal_start]
string="Puntos de inicio activados. Ahora puedes comenzar el juego sin crear un personaje detallado. Asigna únicamente los puntos que desees, o ninguno en absoluto. Cualquier punto no utilizado se puede distribuir más adelante."

[insanity_button_hardcore_start]
string="Sin Puntos de Inicio"

[insanity_desc_hardcore_start]
string="Puntos de inicio desactivados. No se pueden asignar puntos iniciales al comienzo del juego, ya que serán restablecidos. Posteriormente, la progresión continúa con normalidad y los puntos de atributos y habilidades se obtendrán al subir de nivel."

[insanity_suffix_immersive_mode_on]
string=" : Activado"

[insanity_suffix_immersive_mode_off]
string=" : Desactivado"

[insanity_button_immersive_mode] //immersive mode button
string="Modo Inmersivo (Interfaz Mínima)"

[insanity_desc_immersive_mode]
string="Los elementos mínimos de la interfaz proporcionan una pantalla más limpia y una experiencia más inmersiva. Solo permanecen visibles los iconos esenciales, como los inventarios, libros e iconos de transición entre niveles. El Modo Inmersivo puede activarse o desactivarse en cualquier momento desde el menú de opciones (Ajustes de Jugabilidad)."

