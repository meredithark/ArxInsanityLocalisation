//ARX INSANITY ENGLISH 0.6.0

//May 2026 update: All main menu descriptions have been capitalized in order to match Arx Insanity's new visual style and interface.

[insanity_choose_difficulty]
string="Select difficulty level:"

[insanity_button_difficulty_easy]
string="Easy"

[insanity_desc_difficulty_easy]
string="A casual experience for new players. Enemy damage and attributes are reduced. Health regeneration is enabled and potions/items are highly effective."

[insanity_button_difficulty_normal]
string="Normal"

[insanity_desc_difficulty_normal]
string="A balanced experience for most players. Enemies inflict regular damage, are perceptive, and possess balanced attributes. Health regeneration is disabled, more enemies appear, and potions/items retain their normal effectiveness ."

[insanity_button_difficulty_hard]
string="Hard"

[insanity_desc_difficulty_hard]
string="Increased challenge for experienced players. Enemies inflict increased damage and are more perceptive, and possess increased attributes. Health regeneration is disabled, more enemies appear and potions/items are less effective."

[insanity_button_difficulty_very_hard]
string="Very Hard"

[insanity_desc_difficulty_very_hard]
string="A demanding challenge for veteran players. Enemies inflict highly increased damage and are even more perceptive, and possess highly increased attributes. Health regeneration is disabled, even more enemies and potions/items are even less effective."

[insanity_button_difficulty_insanity]
string="Insanity"

[insanity_desc_difficulty_insanity]
string="A brutal experience for hardcore players. Enemies inflict extreme damage, possess heightened awareness, and have greatly increased attributes. Health regeneration is disabled, large amounts of enemies and potions/items are significantly less effective."

[insanity_button_difficulty_nightmare] //secret difficulty
string="Nightmare"

[insanity_desc_difficulty_nightmare]
string="Survival is essential, and the world itself becomes a nightmare. Enemies inflict deadly damage, possess heightened awareness, move faster, and have insane attributes. Health regeneration is disabled, enemy numbers are overwhelming, and potions/items are extremely less effective."

