// Character creation

[insanity_button_normal_start]
string="Default Starting Points"

[insanity_desc_normal_start]
string="Starting points enabled. You can now begin the game without creating a detailed character build. Assign only the points you want, or none at all. Any unused points may be distributed later."

[insanity_button_hardcore_start]
string="No Starting Points"

[insanity_desc_hardcore_start]
string="Starting points disabled. No initial points can be assigned at the start of the game, as they will be reset. Afterward, progression continues normally, and attribute and skill points are earned upon leveling up."

[insanity_suffix_immersive_mode_on]
string=" : Enabled"

[insanity_suffix_immersive_mode_off]
string=" : Disabled"

[insanity_button_immersive_mode] //immersive mode button
string="Immersive Mode (Minimal HUD)"

[insanity_desc_immersive_mode]
string="Minimal HUD elements provide a cleaner screen and a more immersive experience. Only essential icons remain visible, such as inventories, books, and level transition icons. Immersive Mode can be toggled at any time in the options menu (Gameplay settings)."

